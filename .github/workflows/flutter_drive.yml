name: integration test

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drive_android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        api-level: [29]
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: koji-1009/setup-flutter@dd35dcb6aeccda37e5042e1a03aed95e46611a3d # v1.2.1
      - uses: bluefireteam/melos-action@2982f8e4fc92440a219490009d6d05195cb1a6a5 # v3.8.0
      - uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          script: flutter test integration_test -d android
          working-directory: flutter_secure_storage_x/example

  drive_ios:
    name: iOS
    runs-on: macos-latest
    timeout-minutes: 20
    strategy:
      matrix:
        simulator: [{os: "26.2", model: "iPhone 16e"}]
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: koji-1009/setup-flutter@dd35dcb6aeccda37e5042e1a03aed95e46611a3d # v1.2.1
      - run: flutter config --enable-swift-package-manager
      - uses: bluefireteam/melos-action@2982f8e4fc92440a219490009d6d05195cb1a6a5 # v3.8.0
      - name: Pre-build the app
        working-directory: flutter_secure_storage_x/example
        run: flutter build ios --simulator --target=integration_test/app_test.dart
      - uses: futureware-tech/simulator-action@e89aa8f93d3aec35083ff49d2854d07f7186f7f5 # v5
        with:
          os: iOS
          os_version: ${{ matrix.simulator.os }}
          model: ${{ matrix.simulator.model }}
          wait_for_boot: true
          boot_timeout_seconds: 180
      - name: Run flutter integration tests
        working-directory: flutter_secure_storage_x/example
        run: flutter test integration_test -d iphone --verbose

  drive_linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install linux dependencies
        run: |
          sudo apt update -y
          sudo apt install -y ninja-build libgtk-3-dev libsecret-1-dev
      - name: Unlock Keyring
        uses: t1m0thyj/unlock-keyring@cbcf205c879ebd86add70bab3a6abfcce59a5cae # v1.2.0
      - uses: koji-1009/setup-flutter@dd35dcb6aeccda37e5042e1a03aed95e46611a3d # v1.2.1
      - uses: bluefireteam/melos-action@2982f8e4fc92440a219490009d6d05195cb1a6a5 # v3.8.0
      - name: Run flutter integration tests
        working-directory: flutter_secure_storage_x/example
        run: xvfb-run flutter test integration_test -d linux

  drive_windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: koji-1009/setup-flutter@dd35dcb6aeccda37e5042e1a03aed95e46611a3d # v1.2.1
        with:
          channel: stable
      - name: Run flutter doctor
        run: flutter doctor
      - uses: bluefireteam/melos-action@2982f8e4fc92440a219490009d6d05195cb1a6a5 # v3.8.0
      - name: Run flutter integration tests
        working-directory: flutter_secure_storage_x/example
        run: flutter test integration_test -d windows

  drive_web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        option: ["", "--wasm"]
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: koji-1009/setup-flutter@dd35dcb6aeccda37e5042e1a03aed95e46611a3d # v1.2.1
      - name: Run flutter doctor
        run: flutter doctor
      - uses: bluefireteam/melos-action@2982f8e4fc92440a219490009d6d05195cb1a6a5 # v3.8.0
      - name: Setup chromedriver
        run: |
          npx @puppeteer/browsers install chromedriver@stable
          chromedriver --port=4444 &
      - name: Run Flutter Integration tests
        working-directory: flutter_secure_storage_x/example
        run: flutter drive --driver=test_driver/integration_test.dart --target=integration_test/app_test.dart -d web-server ${{ matrix.option }} \
